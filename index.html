<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ichiban Teriyaki</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <header class="header">
    <h1>Ichiban Teriyaki</h1>
    <p>Japanese Comfort Food • Tacoma, WA</p>
    <a class="call-btn" href="tel:2535373441">📞 Call Now</a>
  </header>

  <section class="menu">
    <h2>Menu</h2>

    <div class="item">
      <h3>Chicken Teriyaki</h3>
      <p>$10.99</p>
      <button onclick="addItem('Chicken Teriyaki', 10.99)">Add</button>
    </div>

    <div class="item">
      <h3>Combo Teriyaki</h3>
      <p>$12.99</p>
      <button onclick="addItem('Combo Teriyaki', 12.99)">Add</button>
    </div>

    <div class="item">
      <h3>Spicy Pork Bowl</h3>
      <p>$11.99</p>
      <button onclick="addItem('Spicy Pork Bowl', 11.99)">Add</button>
    </div>
  </section>

  <section class="cart">
    <h2>Your Order</h2>
    <div id="cart"></div>
    <h3 id="total">Total: $0.00</h3>

    <button onclick="sendOrder()" class="order-btn">
      Send Order
    </button>
  </section>

  <script src="script.js"></script>
</body>
</html>
